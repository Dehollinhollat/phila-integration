<!doctype html>
<html lang="fr" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- minimum-scale=1.0 : autorise la rotation sans verrouillage de zoom involontaire -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Phila Integration</title>

    <!-- PWA — thème et couleur de fond pour la splash screen -->
    <meta name="theme-color" content="#1A56B0" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- PWA — iOS/Safari (ne lit pas le manifest W3C) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Phila Integration" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
